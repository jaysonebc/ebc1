<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EagleBorne Capital</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        /* Full-screen image background with slow Ken Burns pan */
        .image-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: url('https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?ixlib=rb-4.0.3&auto=format&fit=crop&w=2944&q=90') no-repeat center center;
            background-size: cover;
            animation: kenburns 30s ease-in-out infinite alternate;
            transform-origin: center center;
        }
        @keyframes kenburns {
            0%   { transform: scale(1.0) translate(0%, 0%); }
            100% { transform: scale(1.08) translate(-2%, -1.5%); }
        }

        /* Dark gradient overlay */
        .overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: linear-gradient(
                to bottom,
                rgba(0,0,0,0.22) 0%,
                rgba(0,0,0,0.48) 45%,
                rgba(0,0,0,0.72) 100%
            );
        }
        /* Subtle grain */
        .overlay::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
            opacity: 0.2;
            pointer-events: none;
        }

        /* Content */
        .content {
            position: fixed;
            inset: 0;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 24px;
        }

        .rule {
            width: 0;
            height: 1px;
            background: rgba(255,255,255,0.5);
            margin-bottom: 28px;
            animation: expandRule 1.3s cubic-bezier(0.16,1,0.3,1) 0.4s forwards;
        }
        @keyframes expandRule { to { width: 110px; } }

        .company-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3.2rem, 9vw, 8.5rem);
            font-weight: 400;
            letter-spacing: 0.14em;
            color: #ffffff;
            line-height: 1;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.7s forwards;
            -webkit-font-smoothing: antialiased;
            text-shadow: 0 4px 48px rgba(0,0,0,0.5);
        }

        .rule-bottom {
            width: 0;
            height: 1px;
            background: rgba(255,255,255,0.5);
            margin-top: 24px;
            margin-bottom: 32px;
            animation: expandRule 1.3s cubic-bezier(0.16,1,0.3,1) 1.0s forwards;
        }

        .tagline {
            font-family: 'Barlow', sans-serif;
            font-weight: 200;
            font-size: clamp(0.65rem, 1.4vw, 0.82rem);
            letter-spacing: 0.38em;
            color: rgba(255,255,255,0.55);
            text-transform: uppercase;
            margin-bottom: 48px;
            opacity: 0;
            animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) 1.2s forwards;
        }

        .cta {
            display: inline-block;
            font-family: 'Barlow', sans-serif;
            font-weight: 300;
            font-size: clamp(0.68rem, 1.2vw, 0.78rem);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #ffffff;
            text-decoration: none;
            padding: 15px 44px;
            border: 1px solid rgba(255,255,255,0.55);
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) 1.45s forwards;
            transition: color 0.4s ease, border-color 0.4s ease;
            -webkit-font-smoothing: antialiased;
        }
        .cta::before {
            content: '';
            position: absolute;
            inset: 0;
            background: #fff;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
            z-index: -1;
        }
        .cta:hover { color: #000; border-color: #fff; }
        .cta:hover::before { transform: scaleX(1); }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .footer-note {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            font-family: 'Barlow', sans-serif;
            font-weight: 200;
            font-size: 0.62rem;
            letter-spacing: 0.22em;
            color: rgba(255,255,255,0.25);
            text-transform: uppercase;
            white-space: nowrap;
            opacity: 0;
            animation: fadeUp 1s ease 1.9s forwards;
        }

        @media (max-width: 600px) {
            .tagline { letter-spacing: 0.2em; }
            .cta { padding: 13px 30px; letter-spacing: 0.2em; }
        }
    </style>
</head>
<body>

    <div class="image-bg"></div>
    <div class="overlay"></div>

    <div class="content">
        <div class="rule"></div>
        <h1 class="company-name">EagleBorne Capital</h1>
        <div class="rule-bottom"></div>
        <p class="tagline">Private Investment &nbsp;&middot;&nbsp; Strategic Growth</p>
        <a class="cta"
           href="mailto:info@eaglebornecapital.com?subject=Inquiry%20%E2%80%94%20EagleBorne%20Capital&body=Hello%2C%0A%0AI%20would%20like%20to%20inquire%20about%20EagleBorne%20Capital.%0A%0A">
            Inquire With Us
        </a>
    </div>

    <div class="footer-note">&copy; 2025 EagleBorne Capital &nbsp;&middot;&nbsp; All Rights Reserved</div>

</body>
</html>
